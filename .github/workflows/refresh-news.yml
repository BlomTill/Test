name: Refresh news page

on:
  schedule:
    # Every 6 hours UTC — adjust as needed
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-news
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build news HTML
        run: python3 news/build_news.py

      - name: Commit site changes if updated
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/news.html docs/trending.json
          if git diff --staged --quiet; then
            echo "No news changes."
          else
            git commit -m "chore: refresh news + trending"
            git push
          fi
