<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>%%PAGE_TITLE%%</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-gradient" aria-hidden="true"></div>
    <main>
      <header>
        <p class="back-nav"><a href="index.html">← Back</a></p>
        <h1>%%PAGE_HEADING%%</h1>
        <p class="tagline">Updated %%GENERATED_AT%%</p>

      <section class="card disclosure-card" aria-labelledby="disc-heading">
        <h2 id="disc-heading">Disclosure</h2>
        <p class="disclosure-body">%%DISCLOSURE%%</p>
      </section>

      <section class="news-section" aria-labelledby="news-heading">
        <h2 id="news-heading" class="news-section-title">Headlines</h2>
        <ul class="news-list">%%ITEMS%%</ul>
      </section>

      <footer>
        <p class="footer-meta">Generated by <code>news/build_news.py</code></p>
      </footer>
    </main>
